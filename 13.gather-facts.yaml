- name: gather facts
  hosts: localServer
  connection: local
  # ansible collects the info of target server, before it executes any other fact
  tasks:
  - name: facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}" # ansible_facts contains all the info of server OS details
      # we can use these facts info to  install the OS if somethin is not possible we can write playbooks use these target server facts.
      