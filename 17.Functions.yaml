---
- name: Functions Demonstration
  hosts: localhost
  connection: local
  vars:
    technologies: "DevOps,Linux,Python" # String
    # dictionary==map
    tags:
      Application: payment
      Environment: dev
    ListTags:
    - key: Application
      value: payment
    - key: Environment
      value: dev
  tasks:
    - name: Use default variable if not defined
      ansible.builtin.debug:
        msg: "My Name is, {{ Name | default('Ramesh') }}"
      # 'Name' is not defined in vars, so it defaults to 'Ramesh'

    - name: Convert string to list using split
      ansible.builtin.debug:
        msg: "Technologies are: {{ technologies | split(',') }}"
      # 'split' turns a string into a list based on a delimiter

    - name: Convert Map to list
      ansible.builtin.debug:
        msg: "Tags are: {{ tags | dict2items }}"

    - name: Transforming lists into dictionaries
      ansible.builtin.debug:
        msg: "tag map: {{ ListTags | items2dict }}"

    - name: read yaml and take it into variable
      ansible.builtin.set_fact:
      student_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}" #lookup is a function and file is student.yml it will read the file and store it in student_yaml

    - name: convert yaml into json
      ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json  }}"
    
